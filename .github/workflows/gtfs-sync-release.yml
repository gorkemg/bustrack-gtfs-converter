name: GTFS Sync & Release

on:
  push:
    paths:
      - config/agencies.json
  schedule:
    - cron: '15 4 * * 0,3,5'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no new GTFS data is detected'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: gtfs-sync-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run Test Suite
        run: python -m unittest discover -s tests -v

  prepare-agencies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      agencies: ${{ steps.agencies.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Agency Matrix
        id: agencies
        run: |
          matrix=$(python3 -c 'import json, pathlib; payload = json.loads(pathlib.Path("config/agencies.json").read_text(encoding="utf-8")); agencies = [entry["id"] for entry in payload if isinstance(entry, dict) and entry.get("id")]; print(json.dumps(agencies))')
          if [ "$matrix" = "[]" ]; then
            echo "No agencies found in config/agencies.json" >&2
            exit 1
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  sync:
    needs:
      - tests
      - prepare-agencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        agency: ${{ fromJson(needs.prepare-agencies.outputs.agencies) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore External Resource Cache
        uses: actions/cache@v4
        with:
          path: internal/assets/cache
          key: external-resource-cache-${{ matrix.agency }}-${{ github.run_id }}
          restore-keys: |
            external-resource-cache-${{ matrix.agency }}-
            external-resource-cache-

      - name: Prepare Timestamp
        id: timestamp
        run: |
          echo "TIMESTAMP=$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_ENV"
          echo "value=$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Run Converter
        id: converter
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p logs
          FORCE_UPDATE_ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_update }}" = "true" ]; then
            FORCE_UPDATE_ARGS="--force-update"
          fi
          python scripts/convert.py --agency ${{ matrix.agency }} --cleanup-extracted $FORCE_UPDATE_ARGS 2>&1 | tee logs/${{ matrix.agency }}.log

      - name: Upload Converter Log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: converter-log-${{ matrix.agency }}
          path: logs/${{ matrix.agency }}.log
          if-no-files-found: ignore

      - name: Check if SQLite archive was created
        id: check_file
        run: |
          if [ -f "data/${{ matrix.agency }}.sqlite.zip" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SQLite Archive Artifact
        if: steps.check_file.outputs.created == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: sqlite-archive-${{ matrix.agency }}
          path: data/${{ matrix.agency }}.sqlite.zip
          if-no-files-found: error

      - name: Check if Release Notes were created
        id: check_release_notes
        run: |
          if [ -f "data/${{ matrix.agency }}.release-notes.md" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture Current Production Asset
        id: previous_asset
        if: steps.check_file.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p previous-release
          if gh release view "${{ matrix.agency }}" --repo "${{ github.repository }}" --json assets > current_release.json 2>/dev/null; then
            asset_name=$(python -c 'import json, pathlib; payload = json.loads(pathlib.Path("current_release.json").read_text(encoding="utf-8")); print(next((str(asset.get("name", "")) for asset in payload.get("assets", []) if str(asset.get("name", "")).endswith(".sqlite.zip")), ""))')
            if [ -n "$asset_name" ]; then
              gh release download "${{ matrix.agency }}" --repo "${{ github.repository }}" --pattern "$asset_name" --dir previous-release --clobber
              mv "previous-release/$asset_name" "previous-release/${{ matrix.agency }}-previous.sqlite.zip"
              echo "available=true" >> "$GITHUB_OUTPUT"
              echo "asset_path=previous-release/${{ matrix.agency }}-previous.sqlite.zip" >> "$GITHUB_OUTPUT"
            else
              echo "available=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Archive Release
        if: steps.check_file.outputs.created == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ matrix.agency }}-${{ steps.timestamp.outputs.value }}
          name: ${{ matrix.agency }} Archive ${{ steps.timestamp.outputs.value }}
          files: data/${{ matrix.agency }}.sqlite.zip
          body_path: data/${{ matrix.agency }}.release-notes.md
          draft: false
          prerelease: false
          make_latest: false
          append_body: false
          generate_release_notes: false

      - name: Create or Update Previous Release
        if: steps.previous_asset.outputs.available == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ matrix.agency }}-previous
          name: ${{ matrix.agency }} Previous ${{ steps.timestamp.outputs.value }}
          files: ${{ steps.previous_asset.outputs.asset_path }}
          body: |
            Rollback release captured from the prior production asset for ${{ matrix.agency }}.
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: false
          append_body: false
          generate_release_notes: false

      - name: Create or Update Production Release
        if: steps.check_file.outputs.created == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ matrix.agency }}
          name: ${{ matrix.agency }} Production ${{ steps.timestamp.outputs.value }}
          files: data/${{ matrix.agency }}.sqlite.zip
          body_path: data/${{ matrix.agency }}.release-notes.md
          draft: false
          prerelease: false
          make_latest: false
          append_body: false
          generate_release_notes: false

      - name: Report Agency Result
        if: always()
        run: |
          if [ "${{ steps.check_file.outputs.created }}" = "true" ]; then
            echo "Agency ${{ matrix.agency }} finished successfully and produced a release artifact." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Agency ${{ matrix.agency }} did not produce a release artifact. Check converter-log-${{ matrix.agency }} for details." >> "$GITHUB_STEP_SUMMARY"
          fi
