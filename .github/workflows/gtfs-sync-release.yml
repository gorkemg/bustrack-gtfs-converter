name: GTFS Sync & Release

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: gtfs-sync-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run Test Suite
        run: python -m unittest discover -s tests -v

  sync:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        agency: [pvta, uta]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run Converter
        id: converter
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p logs
          python scripts/convert.py --agency ${{ matrix.agency }} --cleanup-extracted 2>&1 | tee logs/${{ matrix.agency }}.log

      - name: Upload Converter Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: converter-log-${{ matrix.agency }}
          path: logs/${{ matrix.agency }}.log
          if-no-files-found: ignore

      - name: Check if SQLite archive was created
        id: check_file
        run: |
          if [ -f "data/${{ matrix.agency }}.sqlite.zip" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Release Metadata
        id: release_meta
        if: steps.check_file.outputs.created == 'true'
        run: |
          echo "timestamp=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Upload SQLite Archive Artifact
        if: steps.check_file.outputs.created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-archive-${{ matrix.agency }}
          path: data/${{ matrix.agency }}.sqlite.zip
          if-no-files-found: error

      - name: Create or Update GitHub Release
        if: steps.check_file.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.agency }}
          name: ${{ matrix.agency }} GTFS ${{ steps.release_meta.outputs.timestamp }}
          files: data/${{ matrix.agency }}.sqlite.zip
          body: |
            Automated GTFS update for ${{ matrix.agency }}.
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          append_body: false
          generate_release_notes: false

      - name: Report Agency Result
        if: always()
        run: |
          if [ "${{ steps.check_file.outputs.created }}" = "true" ]; then
            echo "Agency ${{ matrix.agency }} finished successfully and produced a release artifact." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Agency ${{ matrix.agency }} did not produce a release artifact. Check converter-log-${{ matrix.agency }} for details." >> "$GITHUB_STEP_SUMMARY"
          fi
